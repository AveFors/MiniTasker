{% extends "base.html" %}

{% block title %}Новая задача · MiniTasker{% endblock %}

{% block content %}
<a class="back-link" href="{% url 'tasks:task_list' %}">← Назад к задачам</a>

<div class="form-layout">
    <div class="form-heading">
        <p class="eyebrow">Новая запись</p>
        <h1>Создание задачи</h1>
        <p>Заполните основные данные. Их можно будет изменить позже.</p>
    </div>

    <form class="task-form" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% include "includes/task_form_fields.html" %}
        <div class="form-actions">
            <button class="button button-primary" type="submit">Создать задачу</button>
            <a class="button button-ghost" href="{% url 'tasks:task_list' %}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
