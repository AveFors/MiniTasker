<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список задач</title>
</head>
<body>
    <h1>Список задач</h1>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <a href="{% url 'tasks:task_detail' task.pk %}">
                        {{ task.title }}
                    </a>
                    - {{ task.get_status_display }}

                    {% if task.deadline %}
                        - дедлайн: {{ task.deadline }}
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Задач пока нет.</p>
    {% endif %}
</body>
</html>
